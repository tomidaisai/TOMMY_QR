<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TOMMY QR</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="QRコード生成">
        <div class="panel controls-panel">
          <p class="eyebrow">TOMMY QR</p>

          <div class="mode-tabs" role="tablist" aria-label="QRコードの種類">
            <button id="urlModeButton" type="button" class="mode-button active" aria-pressed="true">URL</button>
            <button id="wifiModeButton" type="button" class="mode-button" aria-pressed="false">Wi-Fi</button>
          </div>

          <div id="urlFields">
            <label class="field">
            <span>URL</span>
            <input id="urlInput" type="url" value="https://example.com" placeholder="https://example.com" autocomplete="url">
            </label>
          </div>

          <div id="wifiFields" class="hidden">
            <label class="field">
              <span>SSID</span>
              <input id="ssidInput" type="text" placeholder="Wi-Fi名" autocomplete="off">
            </label>

            <label class="field">
              <span>パスワード</span>
              <input id="passwordInput" type="text" placeholder="パスワード" autocomplete="off">
            </label>

            <label class="field">
              <span>暗号化方式</span>
              <select id="securityInput">
                <option value="WPA" selected>WPA/WPA2</option>
                <option value="WEP">WEP</option>
                <option value="nopass">なし</option>
              </select>
            </label>

            <label class="check">
              <input id="hiddenInput" type="checkbox">
              <span>非公開ネットワーク</span>
            </label>
          </div>

          <div class="actions">
            <button id="downloadButton" type="button">PNG保存</button>
          </div>
        </div>

        <div class="preview-wrap">
          <canvas id="qrCanvas" width="1024" height="1024" aria-label="生成されたQRコード"></canvas>
          <p id="statusText" role="status">URLを入力すると自動で更新されます。</p>
        </div>
      </section>
    </main>

    <div id="qrSource" hidden></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
