<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TOMMY QR</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="QRコード生成">
        <div class="panel controls-panel">
          <p class="eyebrow">TOMMY QR</p>
          <h1>リンクからQRを作る</h1>

          <label class="field">
            <span>URL</span>
            <input id="urlInput" type="url" value="https://example.com" placeholder="https://example.com" autocomplete="url">
          </label>

          <div class="actions">
            <button id="downloadButton" type="button">PNG保存</button>
          </div>
        </div>

        <div class="preview-wrap">
          <canvas id="qrCanvas" width="740" height="740" aria-label="生成されたQRコード"></canvas>
          <p id="statusText" role="status">URLを入力すると自動で更新されます。</p>
        </div>
      </section>
    </main>

    <div id="qrSource" hidden></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
